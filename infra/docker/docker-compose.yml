version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: emerging_talent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"

  seaweed-master:
    image: chrislusf/seaweedfs:3.75
    command: "master"
    ports:
      - "9333:9333"

  seaweed-volume:
    image: chrislusf/seaweedfs:3.75
    command: "volume -mserver=seaweed-master:9333 -port=8080"
    depends_on:
      - seaweed-master
    ports:
      - "8080:8080"

  seaweed-s3:
    image: chrislusf/seaweedfs:3.75
    command: "s3 -filer=seaweed-master:9333 -port=8333"
    depends_on:
      - seaweed-master
    ports:
      - "8333:8333"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && CI=true pnpm install --frozen-lockfile=false --force && pnpm --filter @etp/api dev"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/emerging_talent
      VALKEY_URL: redis://valkey:6379
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      APP_BASE_URL: http://localhost:3000
      API_BASE_URL: http://api:4000
      BETTER_AUTH_SECRET: replace-me
    volumes:
      - ../../:/workspace
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - valkey
      - mailpit

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && CI=true pnpm install --frozen-lockfile=false --force && pnpm --filter @etp/web dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      API_BASE_URL: http://api:4000
      BETTER_AUTH_SECRET: replace-me
    volumes:
      - ../../:/workspace
    ports:
      - "3000:3000"
    depends_on:
      - api

  worker:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && CI=true pnpm install --frozen-lockfile=false --force && pnpm --filter @etp/worker dev"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/emerging_talent
      VALKEY_URL: redis://valkey:6379
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      EMAIL_FROM: no-reply@example.local
    volumes:
      - ../../:/workspace
    depends_on:
      - api
      - valkey
      - mailpit

volumes:
  postgres_data:
